name: Rust CI

# Temporarily manual-only to prevent notification spam while the security hardening
# branch is being stabilized. Re-enable push / pull_request triggers after local
# fmt, clippy, tests, and smoke tests pass cleanly.
on:
  workflow_dispatch:

jobs:
  validate:
    name: fmt-check-clippy-test-security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt clippy
          rustup default stable
          rustc --version
          cargo --version

      - name: Generate lockfile
        run: cargo generate-lockfile

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check compilation
        run: cargo check --all-targets

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all-targets

      - name: Install security tools
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked

      - name: Audit RustSec advisories
        run: cargo audit

      - name: Check dependency policy
        run: cargo deny check
