name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - edge/stable
    paths:
      - "site/**"
      - "docs/community/CONTACT.md"
      - "docs/project/WIKI_ROADMAP.md"
      - "wiki/**"
      - "assets/**"
      - ".nojekyll"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build static site artifact
        run: |
          set -eu
          rm -rf _site
          mkdir -p _site/assets _site/site _site/wiki
          touch _site/.nojekyll

          # Publish status.html/status.json/status-badge.json at /phase1/ and also keep
          # the whole site/ tree available for assets referenced by index.html.
          cp -R site/. _site/
          cp -R site/. _site/site/

          if [ -f docs/community/CONTACT.md ]; then
            cp docs/community/CONTACT.md _site/CONTACT.md
          else
            printf "optional contact doc not present; skipping contact copy\n"
          fi

          if [ -f docs/project/WIKI_ROADMAP.md ]; then
            cp docs/project/WIKI_ROADMAP.md _site/WIKI_ROADMAP.md
          else
            printf "optional wiki roadmap doc not present; skipping roadmap copy\n"
          fi

          if [ -f assets/phase1-banner.svg ]; then
            cp assets/phase1-banner.svg _site/assets/phase1-banner.svg
          else
            printf "optional phase1 banner asset not present; skipping banner copy\n"
          fi

          if [ -f wiki/site/index.html ] && [ -f wiki/docs.css ] && [ -f wiki/docs.js ]; then
            cp wiki/site/index.html wiki/docs.css wiki/docs.js _site/wiki/
          else
            printf "wiki static bundle not present; skipping wiki copy\n"
          fi

          test -f _site/status.html
          test -f _site/status.json
          test -f _site/status-badge.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
