name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - edge/stable
    paths:
      - "site/**"
      - "docs/community/CONTACT.md"
      - "docs/project/WIKI_ROADMAP.md"
      - "wiki/**"
      - "assets/**"
      - ".nojekyll"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build static site artifact
        run: |
          rm -rf _site
          mkdir -p _site/assets _site/wiki
          cp site/index.html site/styles.css site/button-fix.css site/site.js site/button-fix.js site/links.html site/status.html site/status.json site/status-badge.json site/robots.txt site/sitemap.xml .nojekyll _site/
          cp docs/community/CONTACT.md docs/project/WIKI_ROADMAP.md _site/
          cp assets/phase1-banner.svg _site/assets/phase1-banner.svg
          if [ -f wiki/site/index.html ] && [ -f wiki/docs.css ] && [ -f wiki/docs.js ]; then
            cp wiki/site/index.html wiki/docs.css wiki/docs.js _site/wiki/
          else
            printf "wiki static bundle not present; skipping wiki copy\n"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
