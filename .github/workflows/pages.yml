name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - edge/stable
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate public status marker
        run: |
          set -eu
          python3 scripts/update-public-status.py

      - name: Build static site artifact
        run: |
          set -eu
          rm -rf _site
          mkdir -p _site/assets _site/site _site/wiki
          touch _site/.nojekyll

          cp -R site/. _site/
          cp -R site/. _site/site/

          # Force the calm rainbow-space Phase1 visual layer with slow glowing motion on Pages.
          python3 - <<'PY'
          from pathlib import Path
          p = Path('_site/index.html')
          s = p.read_text()
          cache = 'phase1-rainbow-space-v3'
          previous = [
              'phase1-nobackground-v2', 'phase1-superb-overhaul-v1', 'phase1-final-design-v1',
              'phase1-bryforge-aligned-v1', 'phase1-orange-rainbow-v1', 'phase1-polish-77-v1',
              'phase1-orange-spectrum-v1', 'phase1-orange-premium-v1', 'phase1-orange-elite-v1',
              'phase1-rainbow-space-v1', 'phase1-rainbow-space-v2'
          ]
          for old in previous:
              s = s.replace(f'styles.css?v={old}', f'styles.css?v={cache}')
              s = s.replace(f'button-fix.css?v={old}', f'button-fix.css?v={cache}')
              s = s.replace(f'button-fix.js?v={old}', f'button-fix.js?v={cache}')
              s = s.replace(f'site.js?v={old}', f'site.js?v={cache}')
              s = s.replace(f'official-phase1-logo-{old.replace("phase1-", "")}', 'official-phase1-logo-rainbow-space-v3')
          for css in [
              f'<link rel="stylesheet" href="./site/final-design.css?v={cache}">',
              f'<link rel="stylesheet" href="./site/bryforge-aligned.css?v={cache}">',
              f'<link rel="stylesheet" href="./site/phase1-polish-77.css?v={cache}">',
              f'<link rel="stylesheet" href="./site/phase1-rainbow-space.css?v={cache}">',
              f'<link rel="stylesheet" href="./site/rainbow-space-motion.css?v={cache}">',
          ]:
              if css not in s:
                  s = s.replace('</head>', f'  {css}\n</head>')
          for script in [
              f'<script src="./site/visual-overhaul.js?v={cache}"></script>',
              f'<script src="./site/rainbow-space-motion.js?v={cache}"></script>',
          ]:
              if script not in s:
                  s = s.replace('</body>', f'{script}</body>')
          p.write_text(s)
          PY

          if [ -f docs/community/CONTACT.md ]; then
            cp docs/community/CONTACT.md _site/CONTACT.md
          fi
          if [ -f docs/project/WIKI_ROADMAP.md ]; then
            cp docs/project/WIKI_ROADMAP.md _site/WIKI_ROADMAP.md
          fi
          cp -R assets/. _site/assets/
          if [ -f wiki/site/index.html ] && [ -f wiki/docs.css ] && [ -f wiki/docs.js ]; then
            cp wiki/site/index.html wiki/docs.css wiki/docs.js _site/wiki/
          fi

          test -f _site/status.html
          test -f _site/status.json
          test -f _site/status-badge.json
          test -f _site/site/phase1-rainbow-space.css
          test -f _site/site/rainbow-space-motion.css
          test -f _site/site/rainbow-space-motion.js
          test -f _site/rainbow-space-motion.css
          test -f _site/rainbow-space-motion.js
          grep -q 'rainbow-space-motion.css?v=phase1-rainbow-space-v3' _site/index.html
          grep -q 'rainbow-space-motion.js?v=phase1-rainbow-space-v3' _site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
          name: github-pages-${{ github.run_attempt }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_attempt }}
