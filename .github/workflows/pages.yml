name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - edge/stable
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate public status marker
        run: |
          set -eu
          python3 scripts/update-public-status.py

      - name: Build static site artifact
        run: |
          set -eu
          rm -rf _site
          mkdir -p _site/assets _site/site _site/wiki
          touch _site/.nojekyll
          cp -R site/. _site/
          cp -R site/. _site/site/
          cp -R assets/. _site/assets/

          if [ -f docs/community/CONTACT.md ]; then cp docs/community/CONTACT.md _site/CONTACT.md; fi
          if [ -f docs/project/WIKI_ROADMAP.md ]; then cp docs/project/WIKI_ROADMAP.md _site/WIKI_ROADMAP.md; fi
          if [ -f wiki/index.html ] && [ -f wiki/docs.css ] && [ -f wiki/docs.js ]; then
            cp wiki/*.html wiki/docs.css wiki/docs.js _site/wiki/
          elif [ -f wiki/site/index.html ] && [ -f wiki/docs.css ] && [ -f wiki/docs.js ]; then
            cp wiki/site/index.html wiki/docs.css wiki/docs.js _site/wiki/
          fi

          python3 - <<'PY'
          from pathlib import Path
          key = 'phase1-mobile-nav-fix-v1'
          p = Path('_site/index.html')
          s = p.read_text()
          for old in ['phase1-final-background-v1', 'phase1-homepage-cta-v1', 'phase1-side-rail-fix-v1']:
              s = s.replace(f'styles.css?v={old}', f'styles.css?v={key}')
              s = s.replace(f'button-fix.css?v={old}', f'button-fix.css?v={key}')
              s = s.replace(f'site.js?v={old}', f'site.js?v={key}')
              s = s.replace(f'official-phase1-logo-{old.replace("phase1-", "")}', f'official-phase1-logo-{key}')
          nav_script = f'<script src="./site/mobile-nav-fix.js?v={key}"></script>'
          if nav_script not in s:
              s = s.replace('</body>', f'{nav_script}\n</body>')
          p.write_text(s)
          PY

          test -f _site/index.html
          test -f _site/status.html
          test -f _site/status.json
          test -f _site/status-badge.json
          test -f _site/wiki/index.html
          test -f _site/wiki/commands.html
          test -f _site/wiki/docs.css
          test -f _site/wiki/docs.js
          test -f _site/site/button-fix.css
          test -f _site/site/phase1-side-rail-fix.css
          test -f _site/site/phase1-mobile-nav-fix.css
          test -f _site/site/mobile-nav-fix.js
          test -f _site/site/phase1-public-pages-refine.css
          grep -q 'button-fix.css?v=phase1-mobile-nav-fix-v1' _site/index.html
          grep -q 'site.js?v=phase1-mobile-nav-fix-v1' _site/index.html
          grep -q 'mobile-nav-fix.js?v=phase1-mobile-nav-fix-v1' _site/index.html
          grep -q 'commands.html' _site/wiki/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
          name: github-pages-${{ github.run_attempt }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_attempt }}
