name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - edge/stable
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate public status marker
        run: |
          set -eu
          python3 scripts/update-public-status.py

      - name: Build static site artifact
        run: |
          set -eu
          rm -rf _site
          mkdir -p _site/assets _site/site _site/wiki
          touch _site/.nojekyll

          # Publish status.html/status.json/status-badge.json at /phase1/ and also keep
          # the whole site/ tree available for assets referenced by index.html.
          cp -R site/. _site/
          cp -R site/. _site/site/

          # Force the elite orange-spectrum-only Phase1 visual layer on Pages.
          python3 - <<'PY'
          from pathlib import Path
          p = Path('_site/index.html')
          s = p.read_text()
          replacements = {
              'styles.css?v=phase1-nobackground-v2': 'styles.css?v=phase1-orange-elite-v1',
              'styles.css?v=phase1-superb-overhaul-v1': 'styles.css?v=phase1-orange-elite-v1',
              'styles.css?v=phase1-final-design-v1': 'styles.css?v=phase1-orange-elite-v1',
              'styles.css?v=phase1-bryforge-aligned-v1': 'styles.css?v=phase1-orange-elite-v1',
              'styles.css?v=phase1-orange-rainbow-v1': 'styles.css?v=phase1-orange-elite-v1',
              'styles.css?v=phase1-polish-77-v1': 'styles.css?v=phase1-orange-elite-v1',
              'styles.css?v=phase1-orange-spectrum-v1': 'styles.css?v=phase1-orange-elite-v1',
              'styles.css?v=phase1-orange-premium-v1': 'styles.css?v=phase1-orange-elite-v1',
              'button-fix.css?v=phase1-alive-buttons-v6': 'button-fix.css?v=phase1-orange-elite-v1',
              'button-fix.css?v=phase1-visual-overhaul-v2': 'button-fix.css?v=phase1-orange-elite-v1',
              'button-fix.css?v=phase1-superb-overhaul-v1': 'button-fix.css?v=phase1-orange-elite-v1',
              'button-fix.css?v=phase1-final-design-v1': 'button-fix.css?v=phase1-orange-elite-v1',
              'button-fix.css?v=phase1-bryforge-aligned-v1': 'button-fix.css?v=phase1-orange-elite-v1',
              'button-fix.css?v=phase1-orange-rainbow-v1': 'button-fix.css?v=phase1-orange-elite-v1',
              'button-fix.css?v=phase1-polish-77-v1': 'button-fix.css?v=phase1-orange-elite-v1',
              'button-fix.css?v=phase1-orange-spectrum-v1': 'button-fix.css?v=phase1-orange-elite-v1',
              'button-fix.css?v=phase1-orange-premium-v1': 'button-fix.css?v=phase1-orange-elite-v1',
              'button-fix.js?v=phase1-alive-buttons-v6': 'button-fix.js?v=phase1-orange-elite-v1',
              'button-fix.js?v=phase1-visual-overhaul-v2': 'button-fix.js?v=phase1-orange-elite-v1',
              'button-fix.js?v=phase1-superb-overhaul-v1': 'button-fix.js?v=phase1-orange-elite-v1',
              'button-fix.js?v=phase1-final-design-v1': 'button-fix.js?v=phase1-orange-elite-v1',
              'button-fix.js?v=phase1-bryforge-aligned-v1': 'button-fix.js?v=phase1-orange-elite-v1',
              'button-fix.js?v=phase1-orange-rainbow-v1': 'button-fix.js?v=phase1-orange-elite-v1',
              'button-fix.js?v=phase1-polish-77-v1': 'button-fix.js?v=phase1-orange-elite-v1',
              'button-fix.js?v=phase1-orange-spectrum-v1': 'button-fix.js?v=phase1-orange-elite-v1',
              'button-fix.js?v=phase1-orange-premium-v1': 'button-fix.js?v=phase1-orange-elite-v1',
              'site.js?v=phase1-nobackground-v2': 'site.js?v=phase1-orange-elite-v1',
              'site.js?v=phase1-superb-overhaul-v1': 'site.js?v=phase1-orange-elite-v1',
              'site.js?v=phase1-final-design-v1': 'site.js?v=phase1-orange-elite-v1',
              'site.js?v=phase1-bryforge-aligned-v1': 'site.js?v=phase1-orange-elite-v1',
              'site.js?v=phase1-orange-rainbow-v1': 'site.js?v=phase1-orange-elite-v1',
              'site.js?v=phase1-polish-77-v1': 'site.js?v=phase1-orange-elite-v1',
              'site.js?v=phase1-orange-spectrum-v1': 'site.js?v=phase1-orange-elite-v1',
              'site.js?v=phase1-orange-premium-v1': 'site.js?v=phase1-orange-elite-v1',
              'official-phase1-logo-v7': 'official-phase1-logo-orange-elite-v1',
              'official-phase1-logo-final-v1': 'official-phase1-logo-orange-elite-v1',
              'official-phase1-logo-final-v2': 'official-phase1-logo-orange-elite-v1',
              'official-phase1-logo-bryforge-v1': 'official-phase1-logo-orange-elite-v1',
              'official-phase1-logo-orange-rainbow-v1': 'official-phase1-logo-orange-elite-v1',
              'official-phase1-logo-polish-77-v1': 'official-phase1-logo-orange-elite-v1',
              'official-phase1-logo-orange-spectrum-v1': 'official-phase1-logo-orange-elite-v1',
              'official-phase1-logo-orange-premium-v1': 'official-phase1-logo-orange-elite-v1',
          }
          for old, new in replacements.items():
              s = s.replace(old, new)
          for css in [
              '<link rel="stylesheet" href="./site/final-design.css?v=phase1-orange-elite-v1">',
              '<link rel="stylesheet" href="./site/bryforge-aligned.css?v=phase1-orange-elite-v1">',
              '<link rel="stylesheet" href="./site/phase1-polish-77.css?v=phase1-orange-elite-v1">',
              '<link rel="stylesheet" href="./site/phase1-orange-spectrum.css?v=phase1-orange-elite-v1">',
              '<link rel="stylesheet" href="./site/phase1-orange-premium.css?v=phase1-orange-elite-v1">',
              '<link rel="stylesheet" href="./site/phase1-orange-elite.css?v=phase1-orange-elite-v1">',
          ]:
              if css not in s:
                  s = s.replace('</head>', f'  {css}\n</head>')
          script = '<script src="./site/visual-overhaul.js?v=phase1-orange-elite-v1"></script>'
          if script not in s:
              s = s.replace('</body>', f'{script}</body>')
          p.write_text(s)
          PY

          if [ -f docs/community/CONTACT.md ]; then
            cp docs/community/CONTACT.md _site/CONTACT.md
          else
            printf "optional contact doc not present; skipping contact copy\n"
          fi

          if [ -f docs/project/WIKI_ROADMAP.md ]; then
            cp docs/project/WIKI_ROADMAP.md _site/WIKI_ROADMAP.md
          else
            printf "optional wiki roadmap doc not present; skipping roadmap copy\n"
          fi

          cp -R assets/. _site/assets/

          if [ -f wiki/site/index.html ] && [ -f wiki/docs.css ] && [ -f wiki/docs.js ]; then
            cp wiki/site/index.html wiki/docs.css wiki/docs.js _site/wiki/
          else
            printf "wiki static bundle not present; skipping wiki copy\n"
          fi

          test -f _site/status.html
          test -f _site/status.json
          test -f _site/status-badge.json
          test -f _site/site/final-design.css
          test -f _site/site/bryforge-aligned.css
          test -f _site/site/phase1-polish-77.css
          test -f _site/site/phase1-orange-spectrum.css
          test -f _site/site/phase1-orange-premium.css
          test -f _site/site/phase1-orange-elite.css
          test -f _site/site/visual-overhaul.css
          test -f _site/site/visual-overhaul.js
          grep -q 'phase1-orange-elite.css?v=phase1-orange-elite-v1' _site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
          name: github-pages-${{ github.run_attempt }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_attempt }}
