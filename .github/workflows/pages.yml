name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "styles.css"
      - "button-fix.css"
      - "site.js"
      - "button-fix.js"
      - "WIKI_ROADMAP.md"
      - "robots.txt"
      - "sitemap.xml"
      - "wiki/**"
      - "assets/**"
      - ".nojekyll"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build static site artifact
        run: |
          rm -rf _site
          mkdir -p _site/assets _site/wiki
          cp index.html styles.css button-fix.css site.js button-fix.js WIKI_ROADMAP.md robots.txt sitemap.xml .nojekyll _site/
          cp assets/phase1-banner.svg _site/assets/phase1-banner.svg
          cp wiki/index.html wiki/docs.css wiki/docs.js _site/wiki/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
