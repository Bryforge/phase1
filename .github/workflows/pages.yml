name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - edge/stable
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate public status marker
        run: |
          set -eu
          python3 scripts/update-public-status.py

      - name: Build static site artifact
        run: |
          set -eu
          rm -rf _site
          mkdir -p _site/assets _site/site _site/wiki
          touch _site/.nojekyll

          cp -R site/. _site/
          cp -R site/. _site/site/

          # Force the current Phase1 public website recovery layers on Pages.
          python3 - <<'PY'
          from pathlib import Path
          banner = 'phase1-banner-overhaul-v1'
          structure = 'phase1-structure-recovery-v1'
          matrix = 'phase1-matrix-fit-v1'
          polish = 'phase1-matrix-polish-v1'
          readability = 'phase1-matrix-readability-v1'
          star = 'phase1-star-edge-polish-v1'
          eye = 'phase1-eye-candy-v1'
          boost = 'phase1-eye-candy-boost-v1'
          starlight = 'phase1-starlight-motion-v1'
          premium = 'phase1-starlight-premium-v1'
          depth = 'phase1-starlight-depth-v1'
          spectrum = 'phase1-spectrum-buttons-v1'
          solid = 'phase1-spectrum-solid-v1'
          computer = 'phase1-computer-joy-v1'
          harmony = 'phase1-machine-harmony-v1'
          status_polish = 'phase1-status-polish-v1'
          previous = [
              'phase1-nobackground-v2', 'phase1-superb-overhaul-v1', 'phase1-final-design-v1',
              'phase1-bryforge-aligned-v1', 'phase1-orange-rainbow-v1', 'phase1-polish-77-v1',
              'phase1-orange-spectrum-v1', 'phase1-orange-premium-v1', 'phase1-orange-elite-v1',
              'phase1-rainbow-space-v1', 'phase1-rainbow-space-v2', 'phase1-rainbow-space-v3',
              'phase1-rainbow-space-v4', 'phase1-visible-fix-v1', 'phase1-render-fix-v1',
              'phase1-matrix-fit-v1', 'phase1-matrix-polish-v1', 'phase1-matrix-readability-v1',
              'phase1-star-edge-polish-v1', 'phase1-eye-candy-v1', 'phase1-eye-candy-boost-v1',
              'phase1-starlight-motion-v1', 'phase1-starlight-premium-v1', 'phase1-starlight-depth-v1',
              'phase1-spectrum-buttons-v1', 'phase1-spectrum-solid-v1', 'phase1-computer-joy-v1'
          ]
          def add_once(text, tag):
              return text if tag in text else text.replace('</head>', f'  {tag}\n</head>')
          p = Path('_site/index.html')
          s = p.read_text()
          for old in previous:
              s = s.replace(f'styles.css?v={old}', f'styles.css?v={harmony}')
              s = s.replace(f'button-fix.css?v={old}', f'button-fix.css?v={harmony}')
              s = s.replace(f'site.js?v={old}', f'site.js?v={harmony}')
              s = s.replace(f'button-fix.js?v={old}', f'button-fix.js?v={harmony}')
              s = s.replace(f'official-phase1-logo-{old.replace("phase1-", "")}', 'official-phase1-logo-machine-harmony-v1')
          for css in [
              f'<link rel="stylesheet" href="./site/phase1-banner-overhaul.css?v={banner}">',
              f'<link rel="stylesheet" href="./site/phase1-structure-recovery.css?v={structure}">',
              f'<link rel="stylesheet" href="./site/phase1-matrix-fit.css?v={matrix}">',
              f'<link rel="stylesheet" href="./site/phase1-matrix-polish.css?v={polish}">',
              f'<link rel="stylesheet" href="./site/phase1-matrix-readability.css?v={readability}">',
              f'<link rel="stylesheet" href="./site/phase1-star-edge-polish.css?v={star}">',
              f'<link rel="stylesheet" href="./site/phase1-eye-candy.css?v={eye}">',
              f'<link rel="stylesheet" href="./site/phase1-eye-candy-boost.css?v={boost}">',
              f'<link rel="stylesheet" href="./site/phase1-starlight-motion.css?v={starlight}">',
              f'<link rel="stylesheet" href="./site/phase1-starlight-premium.css?v={premium}">',
              f'<link rel="stylesheet" href="./site/phase1-starlight-depth.css?v={depth}">',
              f'<link rel="stylesheet" href="./site/phase1-spectrum-buttons.css?v={spectrum}">',
              f'<link rel="stylesheet" href="./site/phase1-spectrum-solid.css?v={solid}">',
              f'<link rel="stylesheet" href="./site/phase1-computer-joy.css?v={computer}">',
              f'<link rel="stylesheet" href="./site/phase1-machine-harmony.css?v={harmony}">',
          ]:
              s = add_once(s, css)
          p.write_text(s)

          sp = Path('_site/status.html')
          if sp.exists():
              t = sp.read_text()
              for css in [
                  f'<link rel="stylesheet" href="./site/phase1-eye-candy-boost.css?v={boost}">',
                  f'<link rel="stylesheet" href="./site/phase1-starlight-motion.css?v={starlight}">',
                  f'<link rel="stylesheet" href="./site/phase1-starlight-premium.css?v={premium}">',
                  f'<link rel="stylesheet" href="./site/phase1-starlight-depth.css?v={depth}">',
                  f'<link rel="stylesheet" href="./site/phase1-status-polish.css?v={status_polish}">',
                  f'<link rel="stylesheet" href="./site/phase1-spectrum-buttons.css?v={spectrum}">',
                  f'<link rel="stylesheet" href="./site/phase1-spectrum-solid.css?v={solid}">',
                  f'<link rel="stylesheet" href="./site/phase1-computer-joy.css?v={computer}">',
                  f'<link rel="stylesheet" href="./site/phase1-machine-harmony.css?v={harmony}">',
              ]:
                  t = add_once(t, css)
              sp.write_text(t)
          PY

          if [ -f docs/community/CONTACT.md ]; then
            cp docs/community/CONTACT.md _site/CONTACT.md
          fi
          if [ -f docs/project/WIKI_ROADMAP.md ]; then
            cp docs/project/WIKI_ROADMAP.md _site/WIKI_ROADMAP.md
          fi
          cp -R assets/. _site/assets/
          if [ -f wiki/site/index.html ] && [ -f wiki/docs.css ] && [ -f wiki/docs.js ]; then
            cp wiki/site/index.html wiki/docs.css wiki/docs.js _site/wiki/
          fi

          test -f _site/status.html
          test -f _site/status.json
          test -f _site/status-badge.json
          test -f _site/site/phase1-banner-overhaul.css
          test -f _site/site/phase1-structure-recovery.css
          test -f _site/site/phase1-matrix-fit.css
          test -f _site/site/phase1-matrix-polish.css
          test -f _site/site/phase1-matrix-readability.css
          test -f _site/site/phase1-star-edge-polish.css
          test -f _site/site/phase1-eye-candy.css
          test -f _site/site/phase1-eye-candy-boost.css
          test -f _site/site/phase1-starlight-motion.css
          test -f _site/site/phase1-starlight-premium.css
          test -f _site/site/phase1-starlight-depth.css
          test -f _site/site/phase1-status-polish.css
          test -f _site/site/phase1-spectrum-buttons.css
          test -f _site/site/phase1-spectrum-solid.css
          test -f _site/site/phase1-computer-joy.css
          test -f _site/site/phase1-machine-harmony.css
          grep -q 'phase1-starlight-depth.css?v=phase1-starlight-depth-v1' _site/index.html
          grep -q 'phase1-spectrum-buttons.css?v=phase1-spectrum-buttons-v1' _site/index.html
          grep -q 'phase1-spectrum-solid.css?v=phase1-spectrum-solid-v1' _site/index.html
          grep -q 'phase1-computer-joy.css?v=phase1-computer-joy-v1' _site/index.html
          grep -q 'phase1-machine-harmony.css?v=phase1-machine-harmony-v1' _site/index.html
          grep -q 'button-fix.css?v=phase1-machine-harmony-v1' _site/index.html
          grep -q 'site.js?v=phase1-machine-harmony-v1' _site/index.html
          grep -q 'phase1-status-polish.css?v=phase1-status-polish-v1' _site/status.html
          grep -q 'phase1-spectrum-buttons.css?v=phase1-spectrum-buttons-v1' _site/status.html
          grep -q 'phase1-spectrum-solid.css?v=phase1-spectrum-solid-v1' _site/status.html
          grep -q 'phase1-computer-joy.css?v=phase1-computer-joy-v1' _site/status.html
          grep -q 'phase1-machine-harmony.css?v=phase1-machine-harmony-v1' _site/status.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
          name: github-pages-${{ github.run_attempt }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_attempt }}
