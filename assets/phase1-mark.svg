<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Phase1 mark</title>
  <desc id="desc">Standalone metallic Phase1 mark on a black background.</desc>
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.2" stop-color="#eef7ff"/>
      <stop offset="0.48" stop-color="#9ebef0"/>
      <stop offset="0.72" stop-color="#f9fcff"/>
      <stop offset="1" stop-color="#6f96db"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
