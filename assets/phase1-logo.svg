<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 360" role="img" aria-labelledby="title desc">
  <title id="title">Phase1 logo</title>
  <desc id="desc">Clean Phase1 logo mark and wordmark on transparent background.</desc>
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.22" stop-color="#d9ecff"/>
      <stop offset="0.48" stop-color="#7ea8ff"/>
      <stop offset="0.72" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#4f79ff"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#23f7ff"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#5588ff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-40%" width="160%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.12
                0 0 0 0 0.45
                0 0 0 0 1
                0 0 0 0.95 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#glow)">
    <path d="M105 286 V84 L226 30 V93 L161 122 V238 Z" fill="url(#steel)" stroke="url(#edge)" stroke-width="4"/>
    <path d="M196 224 V122 L302 76 V180 L246 204 V149 L226 158 V213 Z" fill="url(#steel)" stroke="url(#edge)" stroke-width="4"/>
    <path d="M333 62 L282 84 V219 L333 196 Z" fill="url(#steel)" opacity="0.95"/>
  </g>

  <g filter="url(#glow)" fill="url(#steel)" stroke="url(#edge)" stroke-width="2">
    <text x="405" y="235"
      font-family="Arial Black, Impact, Inter, system-ui, sans-serif"
      font-size="176"
      font-weight="900"
      letter-spacing="-8">Phase</text>
    <text x="1138" y="235"
      font-family="Arial Black, Impact, Inter, system-ui, sans-serif"
      font-size="188"
      font-weight="900"
      letter-spacing="-8">1</text>
  </g>
</svg>
