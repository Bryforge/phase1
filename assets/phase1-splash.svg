<svg xmlns="http://www.w3.org/2000/svg" width="900" height="470" viewBox="0 0 900 470" role="img" aria-labelledby="title desc">
  <title id="title">phase1 colored boot splash</title>
  <desc id="desc">A dark terminal-style phase1 boot selector with rainbow ASCII art and safe-mode status.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#06131f"/>
      <stop offset="55%" stop-color="#071827"/>
      <stop offset="100%" stop-color="#10051e"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="470" rx="26" fill="#05070d"/>
  <rect x="18" y="18" width="864" height="434" rx="18" fill="url(#panel)" stroke="#21e6c1" stroke-width="2" opacity="0.98"/>
  <rect x="38" y="38" width="824" height="394" rx="10" fill="#020812" stroke="#153447" stroke-width="1"/>

  <g font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="22" font-weight="700" filter="url(#glow)">
    <text x="70" y="92" fill="#ff3366"> ____  _                     __ </text>
    <text x="70" y="120" fill="#ffcc33">|  _ \| |__   __ _ ___  ___ /_ |</text>
    <text x="70" y="148" fill="#39ff14">| |_) | '_ \ / _` / __|/ _ \ | |</text>
    <text x="70" y="176" fill="#00e5ff">|  __/| | | | (_| \__ \  __/ | |</text>
    <text x="70" y="204" fill="#9d5cff">|_|   |_| |_|\__,_|___/\___| |_|</text>
  </g>

  <g font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="19">
    <text x="500" y="92" fill="#9aa7b2">os      <tspan fill="#e6edf3">phase1 v3.6.0</tspan></text>
    <text x="500" y="120" fill="#9aa7b2">profile <tspan fill="#e6edf3">mobile-safe</tspan></text>
    <text x="500" y="148" fill="#9aa7b2">security <tspan fill="#39ff14">safe</tspan></text>
    <text x="500" y="176" fill="#9aa7b2">device  <tspan fill="#e6edf3">mobile</tspan></text>
    <text x="500" y="204" fill="#9aa7b2">display <tspan fill="#ffcc33">rainbow</tspan></text>
    <text x="500" y="232" fill="#9aa7b2">state   <tspan fill="#e6edf3">volatile</tspan></text>
    <text x="500" y="260" fill="#9aa7b2">config  <tspan fill="#e6edf3">phase1.conf</tspan></text>
    <text x="500" y="298" fill="#21e6c1">fastfetch boot // cyberdeck ready</text>
  </g>

  <g font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="17">
    <text x="70" y="264" fill="#00e5ff">-- BOOT ────────────────────────────────────</text>
    <text x="70" y="292" fill="#e6edf3">  1  boot system       <tspan fill="#9aa7b2">save+start</tspan></text>
    <text x="70" y="318" fill="#e6edf3">  2  color output      <tspan fill="#39ff14">on</tspan></text>
    <text x="70" y="344" fill="#e6edf3">  3  ascii compatible  <tspan fill="#9aa7b2">off</tspan></text>
    <text x="70" y="370" fill="#e6edf3">  4  safe mode         <tspan fill="#39ff14">on</tspan></text>
    <text x="70" y="396" fill="#e6edf3">  p  persistent state  <tspan fill="#9aa7b2">off</tspan></text>
    <text x="500" y="344" fill="#39ff14">Secure default: safe=on</text>
    <text x="500" y="370" fill="#9aa7b2">Enter=save+boot  p=persist  h=help</text>
    <text x="500" y="396" fill="#00e5ff">phase1://root ~ ❯</text>
  </g>
</svg>
