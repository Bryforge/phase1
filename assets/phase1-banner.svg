<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Phase1 v4.2.0 Stable</title>
  <desc id="desc">Neo Tokyo terminal banner for Phase1 v4.2.0 stable with 100 out of 100 quality score, safe mode on, host trust off, offline-first posture, WASI-lite sandboxing, Bryforge credit, and GitHub project link.</desc>
  <defs>
    <linearGradient id="cyanPurple" x1="0" x2="1">
      <stop offset="0" stop-color="#25f6ff"/>
      <stop offset="0.52" stop-color="#6ffcff"/>
      <stop offset="1" stop-color="#b86cff"/>
    </linearGradient>
    <linearGradient id="stable" x1="0" x2="1">
      <stop offset="0" stop-color="#1cecff"/>
      <stop offset="1" stop-color="#b669ff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1">
      <stop offset="0" stop-color="#05151d" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#080713" stop-opacity="0.95"/>
    </linearGradient>
    <radialGradient id="cityGlow" cx="50%" cy="100%" r="75%">
      <stop offset="0" stop-color="#33135f"/>
      <stop offset="0.48" stop-color="#090a15"/>
      <stop offset="1" stop-color="#01030a"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0v32" fill="none" stroke="#14323f" stroke-width="1" opacity="0.35"/>
    </pattern>
    <style>
      .mono{font-family:Menlo,Consolas,'SFMono-Regular',monospace}.sans{font-family:Arial,Helvetica,sans-serif}.heavy{font-family:Arial Black,Impact,Arial,sans-serif;font-weight:900}.small{font-size:32px}.muted{fill:#6a7a93;opacity:.5}.white{fill:#f4fbff}.cyan{fill:#25f6ff}.purple{fill:#b669ff}.stroke-cyan{stroke:#25f6ff}.stroke-purple{stroke:#b669ff}
    </style>
  </defs>
  <rect width="1672" height="941" fill="url(#cityGlow)"/>
  <rect width="1672" height="941" fill="url(#grid)" opacity="0.45"/>
  <g opacity="0.45">
    <rect x="0" y="620" width="68" height="310" fill="#070512"/><rect x="18" y="512" width="38" height="45" fill="#1e0b43"/><rect x="12" y="565" width="48" height="52" fill="#330b58"/>
    <rect x="1604" y="582" width="68" height="350" fill="#070512"/><rect x="1617" y="470" width="38" height="88" fill="#210a4b"/><rect x="1578" y="670" width="22" height="240" fill="#0c1230"/>
    <g fill="#ff4dff" opacity="0.5"><rect x="18" y="690" width="34" height="5"/><rect x="1620" y="530" width="30" height="5"/><rect x="1620" y="548" width="28" height="5"/><rect x="30" y="760" width="26" height="5"/></g>
    <g fill="#00eaff" opacity="0.4"><rect x="75" y="720" width="25" height="130"/><rect x="1540" y="640" width="22" height="180"/></g>
  </g>
  <g filter="url(#softGlow)" opacity="0.95">
    <rect x="103" y="52" width="1466" height="844" rx="10" fill="#020610" stroke="url(#cyanPurple)" stroke-width="4"/>
    <path d="M103 140V72l42-42h119M1569 140V72l-42-42h-119M103 803v68l42 42h119M1569 803v68l-42 42h-119" fill="none" stroke="url(#cyanPurple)" stroke-width="8"/>
    <path d="M174 52h1190M206 896h1186" stroke="url(#cyanPurple)" stroke-width="2" opacity="0.85"/>
  </g>
  <g class="mono" font-size="31" fill="#22f6ff" opacity="0.95">
    <text x="164" y="103">phase1@system:~$</text><rect x="378" y="82" width="14" height="27" fill="#e9fbff"/>
  </g>
  <g class="mono muted" font-size="18"><text x="164" y="275">&gt; init system</text><text x="164" y="302">&gt; load modules</text><text x="164" y="329">&gt; verify integrity</text><text x="164" y="356">&gt; all-systems nominal</text></g>
  <g class="mono muted" font-size="18"><rect x="1286" y="448" width="190" height="140" fill="#06111b" stroke="#17364a"/><text x="1304" y="475">&gt; phase1 --version</text><text x="1304" y="502">v4.2.0-stable</text><text x="1304" y="535">&gt; status</text><text x="1304" y="562">stable</text></g>
  <g class="heavy" text-anchor="middle" filter="url(#glow)">
    <text x="836" y="217" font-size="136" fill="#f7fdff" letter-spacing="12" stroke="#06111a" stroke-width="5">PHASE1 <tspan fill="#9c8cff">v4.2.0</tspan></text>
    <text x="836" y="356" font-size="122" fill="url(#stable)" letter-spacing="13" stroke="#06111a" stroke-width="5">STABLE</text>
  </g>
  <g text-anchor="middle" class="mono" font-size="43" fill="#ffffff"><path d="M356 405h115m730 0h115" stroke="#25f6ff" stroke-width="3"/><text x="836" y="414">Terminal-based computing system</text></g>
  <g filter="url(#softGlow)"><rect x="490" y="448" width="692" height="142" rx="18" fill="#070817" stroke="url(#cyanPurple)" stroke-width="3"/><path d="M570 471l58 32v64l-58 32-58-32v-64z" fill="none" stroke="#caa7ff" stroke-width="9"/><path d="M542 532l24 25 54-62" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/><text class="heavy" x="692" y="525" font-size="86" fill="#f5eeff">100/100</text><text class="heavy" x="703" y="566" font-size="34" fill="#b56bff" letter-spacing="7">QUALITY SCORE</text></g>
  <g class="sans" font-weight="800" font-size="30">
    <g><rect x="210" y="612" width="285" height="102" rx="6" fill="url(#panel)" stroke="#25f6ff"/><path d="M268 635l49 21v31c0 31-23 49-49 63-26-14-49-32-49-63v-31z" fill="none" stroke="#25f6ff" stroke-width="7"/><path d="M247 688l17 17 32-42" fill="none" stroke="#25f6ff" stroke-width="7"/><text x="315" y="659" fill="#fff">SAFE MODE</text><text x="315" y="695" fill="#25f6ff">ON</text></g>
    <g><rect x="525" y="612" width="303" height="102" rx="6" fill="url(#panel)" stroke="#8778ff"/><rect x="571" y="662" width="48" height="43" rx="5" fill="none" stroke="#b669ff" stroke-width="7"/><path d="M583 662v-22c0-30 25-40 41-24 7 7 10 15 10 24v22" fill="none" stroke="#b669ff" stroke-width="7"/><text x="636" y="659" fill="#fff">HOST TRUST</text><text x="636" y="695" fill="#b669ff">OFF</text></g>
    <g><rect x="858" y="612" width="287" height="102" rx="6" fill="url(#panel)" stroke="#25f6ff"/><circle cx="918" cy="663" r="37" fill="none" stroke="#25f6ff" stroke-width="7"/><path d="M881 663h74M918 626c20 22 20 52 0 74M918 626c-20 22-20 52 0 74" stroke="#25f6ff" stroke-width="5" fill="none"/><text x="980" y="659" fill="#fff">OFFLINE-</text><text x="980" y="695" fill="#25f6ff">FIRST</text></g>
    <g><rect x="1175" y="612" width="283" height="102" rx="6" fill="url(#panel)" stroke="#b669ff"/><path d="M1236 631l42 24v48l-42 24-42-24v-48zM1236 631v48l42 24M1236 679l-42 24M1194 655l42 24 42-24" fill="none" stroke="#b669ff" stroke-width="6"/><text x="1290" y="659" fill="#fff">WASI-LITE</text><text x="1290" y="695" fill="#ff69ff">SANDBOXING</text></g>
  </g>
  <text class="mono white" x="280" y="765" font-size="31">&gt; Validated release. Stable representation promoted and tagged.</text>
  <g><rect x="164" y="805" width="1344" height="83" rx="6" fill="#060812" stroke="#7c72d9" stroke-width="2"/><rect x="210" y="824" width="54" height="54" rx="5" fill="none" stroke="#25f6ff" stroke-width="5"/><text x="222" y="862" class="mono" font-size="42" fill="#25f6ff">&gt;_</text><text x="295" y="858" class="mono white" font-size="29">Built by <tspan fill="#25f6ff">Chase Bryan / Bryforge</tspan></text><path d="M834 819v56" stroke="#2a6880" stroke-width="2"/><circle cx="927" cy="850" r="23" fill="#f4fbff"/><text x="968" y="858" class="mono" font-size="29" fill="#25f6ff">github.com/Bryforge/phase1</text></g>
  <g class="sans" font-size="30" font-weight="900" fill="#ff65ff" filter="url(#glow)"><text x="38" y="430" transform="rotate(-90 38 430)">未来を構築する</text><text x="1626" y="506" transform="rotate(-90 1626 506)">ターミナルが力だ</text></g>
  <g stroke="#25f6ff" opacity="0.55"><path d="M143 113h35M143 137h12M143 161h8M143 185h12"/><path d="M1355 104h25M1404 104h23M1449 104h25"/></g>
  <g stroke="#b669ff" stroke-width="4" fill="none"><path d="M1353 103h31"/><rect x="1416" y="82" width="22" height="22"/><path d="M1476 82l29 29M1505 82l-29 29"/></g>
</svg>
