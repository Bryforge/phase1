<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Phase1 public banner with Base1 and Fyr</title>
  <desc id="desc">A premium futuristic public banner for Phase1 with Base1 and Fyr branding, orbital globe, secure system motifs, and blue-orange energy split.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="72%">
      <stop offset="0" stop-color="#0b1730"/>
      <stop offset="0.44" stop-color="#050914"/>
      <stop offset="1" stop-color="#010207"/>
    </radialGradient>
    <linearGradient id="phaseText" x1="330" x2="1260" y1="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.48" stop-color="#b9d7ff"/>
      <stop offset="0.72" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#5aa8ff"/>
    </linearGradient>
    <linearGradient id="blueGlow" x1="270" x2="820" y1="160" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#31d7ff"/>
      <stop offset="1" stop-color="#2767ff"/>
    </linearGradient>
    <linearGradient id="orangeGlow" x1="835" x2="1410" y1="170" y2="745" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffe083"/>
      <stop offset="0.38" stop-color="#ff8a1f"/>
      <stop offset="1" stop-color="#ff381f"/>
    </linearGradient>
    <linearGradient id="metal" x1="650" x2="940" y1="110" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.4" stop-color="#a8c7ee"/>
      <stop offset="1" stop-color="#f7fbff"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.10  0 0 0 0 0.55  0 0 0 0 1  0 0 0 .95 0" result="blue"/>
      <feMerge><feMergeNode in="blue"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fireGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1  0 0 0 0 .34  0 0 0 0 .02  0 0 0 1 0" result="fire"/>
      <feMerge><feMergeNode in="fire"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-30%" y="-50%" width="160%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#66ccff" stroke-opacity=".08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity=".55"/>

  <g opacity=".58">
    <path d="M0 650 C240 632 330 560 500 568 C720 578 760 704 980 690 C1190 677 1305 560 1600 540" fill="none" stroke="#236dff" stroke-opacity=".32" stroke-width="1.8"/>
    <path d="M0 245 C250 258 325 198 510 214 C725 232 783 354 990 330 C1220 304 1322 172 1600 182" fill="none" stroke="#39d5ff" stroke-opacity=".26" stroke-width="1.5"/>
    <path d="M1120 120 C1260 178 1378 278 1470 430 C1370 395 1266 420 1188 513 C1090 630 1014 720 838 728" fill="none" stroke="#ff7a18" stroke-opacity=".28" stroke-width="1.6"/>
  </g>

  <g transform="translate(800 410)">
    <circle r="318" fill="#020711" opacity=".92"/>
    <circle r="316" fill="none" stroke="#61d7ff" stroke-width="2" stroke-opacity=".22"/>
    <circle r="316" fill="none" stroke="#ff8d2a" stroke-width="2" stroke-opacity=".18" stroke-dasharray="540 210" stroke-dashoffset="160"/>
    <ellipse rx="318" ry="96" fill="none" stroke="#87ddff" stroke-width="1.2" stroke-opacity=".28"/>
    <ellipse rx="318" ry="182" fill="none" stroke="#87ddff" stroke-width="1" stroke-opacity=".16"/>
    <ellipse rx="318" ry="250" fill="none" stroke="#87ddff" stroke-width=".9" stroke-opacity=".1"/>
    <path d="M-315 0H315M0-315V315" stroke="#7fdcff" stroke-opacity=".10"/>
    <path d="M-235-215C-168-246-96-259-19-255C97-249 196-204 280-121M-292 114C-179 75-72 64 29 82C140 102 222 154 296 244" fill="none" stroke="#a7efff" stroke-width="1" stroke-opacity=".22"/>
    <g opacity=".65">
      <path d="M-245-110c25-23 61-25 91-8 22 13 54 14 76 0 38-23 76-13 93 11 17 25 55 34 94 28 52-8 93 9 129 45" fill="none" stroke="#5dd6ff" stroke-opacity=".34"/>
      <path d="M-232 58c52-33 111-34 161-12 46 20 83 16 125-7 71-40 146-8 205 41" fill="none" stroke="#5dd6ff" stroke-opacity=".22"/>
      <path d="M22-247c64 62 89 134 88 212-2 102-55 207-138 295" fill="none" stroke="#ff9950" stroke-opacity=".20"/>
    </g>
  </g>

  <g filter="url(#softGlow)">
    <ellipse cx="760" cy="463" rx="615" ry="116" transform="rotate(-17 760 463)" fill="none" stroke="url(#blueGlow)" stroke-width="5" stroke-opacity=".72"/>
    <ellipse cx="831" cy="503" rx="648" ry="122" transform="rotate(-17 831 503)" fill="none" stroke="url(#orangeGlow)" stroke-width="4" stroke-opacity=".62" stroke-dasharray="975 460" stroke-dashoffset="-410"/>
  </g>

  <g opacity=".75" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="24" letter-spacing="4" fill="#c9eaff">
    <text x="185" y="378">&lt;/&gt; BUILD</text>
    <text x="185" y="424">▷ EXECUTE</text>
    <text x="185" y="470">▤ STORE</text>
    <text x="185" y="516">◇ VERIFY</text>
    <text x="185" y="562">↗ CONNECT</text>
  </g>
  <g opacity=".30" stroke="#3ebcff" stroke-width="1.5" fill="none">
    <path d="M80 178h250l46 46h196"/><path d="M52 622h310l55-55h150"/><path d="M1226 260h208l58 58h72"/><path d="M1130 654h244l54-54h132"/>
    <circle cx="376" cy="224" r="5" fill="#35d1ff"/><circle cx="417" cy="567" r="5" fill="#35d1ff"/><circle cx="1428" cy="600" r="5" fill="#ff8c24"/>
  </g>
  <g opacity=".15" fill="#7ecfff" font-family="SFMono-Regular, Consolas, Monaco, monospace" font-size="13">
    <text x="70" y="86">connect0000,</text><text x="70" y="111">boot::{guarded, verified}</text><text x="70" y="136">phase1::base1::fyr</text>
    <text x="71" y="190">fn main() -&gt; i32 {</text><text x="92" y="216">execute(&quot;trusted&quot;);</text><text x="71" y="242">}</text>
  </g>

  <g transform="translate(720 118)" filter="url(#textGlow)">
    <path d="M90 0 218 0 218 128 164 128 164 53 90 53 90 0Z" fill="url(#metal)"/>
    <path d="M90 75 145 75 145 202 18 202 18 148 90 148Z" fill="url(#metal)"/>
    <path d="M18 148 90 75 90 148Z" fill="#dbeeff" opacity=".9"/>
  </g>

  <text x="800" y="578" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="172" font-weight="800" letter-spacing="-8" fill="url(#phaseText)" filter="url(#textGlow)">Phase1</text>
  <rect x="384" y="623" width="832" height="2" fill="#80caff" opacity=".54"/>
  <circle cx="800" cy="624" r="5" fill="#f4fbff" filter="url(#softGlow)"/>

  <g transform="translate(405 672)" filter="url(#softGlow)">
    <path d="M0 45 62 15 124 45 62 75Z" fill="none" stroke="#8ec7ff" stroke-width="7"/>
    <path d="M10 72 62 98 114 72" fill="none" stroke="#6d63ff" stroke-width="7"/>
    <path d="M14 98 62 122 110 98" fill="none" stroke="#8f7aff" stroke-width="7"/>
    <text x="165" y="86" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="92" font-weight="750" letter-spacing="-4" fill="#f7fbff">base1</text>
    <text x="35" y="158" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="18" letter-spacing="6" fill="#4fa8ff">FOUNDATION · INFRASTRUCTURE · TRUST</text>
  </g>

  <g transform="translate(895 671)" filter="url(#fireGlow)">
    <path d="M70 98c-30-29-24-62 9-98-1 27 22 34 34 54 9-35 44-51 80-66-29 39-3 66 12 92 25 44-6 93-72 93-32 0-50-15-63-75Z" fill="url(#orangeGlow)"/>
    <path d="M121 140c-22-14-14-41 11-70 3 20 17 28 28 43 12 16 2 36-39 27Z" fill="#fff0a8" opacity=".85"/>
    <text x="238" y="91" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="92" font-weight="800" font-style="italic" letter-spacing="-4" fill="#ffd779">Fyr</text>
    <text x="30" y="158" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="18" letter-spacing="6" fill="#ff8a24">SPEED · EXECUTION · IGNITION</text>
  </g>

  <text x="800" y="844" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="25" letter-spacing="10" fill="#a9b8cc" opacity=".92">ONE FOUNDATION. <tspan fill="#54adff">INFINITE</tspan> POSSIBILITIES.</text>
</svg>
