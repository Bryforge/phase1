<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Phase1 v4.2.0 Stable</title>
  <desc id="desc">Aligned Neo Tokyo terminal banner for Phase1 v4.2.0 stable with 100 out of 100 quality score, safe defaults, offline-first posture, WASI-lite sandboxing, Bryforge credit, and GitHub project link.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#02060d"/>
      <stop offset="0.52" stop-color="#050814"/>
      <stop offset="1" stop-color="#090315"/>
    </linearGradient>
    <linearGradient id="cyanPurple" x1="0" x2="1">
      <stop offset="0" stop-color="#25f6ff"/>
      <stop offset="0.58" stop-color="#6ffcff"/>
      <stop offset="1" stop-color="#b86cff"/>
    </linearGradient>
    <linearGradient id="stable" x1="0" x2="1">
      <stop offset="0" stop-color="#1cecff"/>
      <stop offset="1" stop-color="#b669ff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1">
      <stop offset="0" stop-color="#061621" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#080713" stop-opacity="0.96"/>
    </linearGradient>
    <radialGradient id="floorGlow" cx="50%" cy="100%" r="74%">
      <stop offset="0" stop-color="#391465" stop-opacity="0.88"/>
      <stop offset="0.45" stop-color="#101025" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#02040a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0v32" fill="none" stroke="#14323f" stroke-width="1" opacity="0.34"/>
    </pattern>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .mono{font-family:Menlo,Consolas,'SFMono-Regular',monospace}
      .sans{font-family:Arial,Helvetica,sans-serif}
      .heavy{font-family:'Arial Black',Impact,Arial,sans-serif;font-weight:900}
      .white{fill:#f4fbff}.cyan{fill:#25f6ff}.purple{fill:#b669ff}
      .muted{fill:#6a7a93;opacity:.55}
    </style>
  </defs>

  <rect width="1672" height="941" fill="url(#bg)"/>
  <rect width="1672" height="941" fill="url(#floorGlow)"/>
  <rect width="1672" height="941" fill="url(#grid)" opacity="0.48"/>

  <g opacity="0.52">
    <rect x="0" y="626" width="72" height="300" fill="#070512"/>
    <rect x="18" y="512" width="40" height="45" fill="#1e0b43"/>
    <rect x="12" y="565" width="50" height="52" fill="#330b58"/>
    <rect x="1600" y="582" width="72" height="344" fill="#070512"/>
    <rect x="1616" y="470" width="38" height="88" fill="#210a4b"/>
    <rect x="1578" y="670" width="22" height="238" fill="#0c1230"/>
    <g fill="#ff4dff" opacity="0.54">
      <rect x="18" y="690" width="34" height="5"/>
      <rect x="1620" y="530" width="30" height="5"/>
      <rect x="1620" y="548" width="28" height="5"/>
      <rect x="30" y="760" width="26" height="5"/>
    </g>
    <g fill="#00eaff" opacity="0.45">
      <rect x="75" y="720" width="25" height="130"/>
      <rect x="1540" y="640" width="22" height="180"/>
    </g>
  </g>

  <g filter="url(#softGlow)">
    <rect x="104" y="50" width="1464" height="846" rx="10" fill="#020610" stroke="url(#cyanPurple)" stroke-width="4"/>
    <path d="M104 140V72l42-42h120M1568 140V72l-42-42h-120M104 804v68l42 42h120M1568 804v68l-42 42h-120" fill="none" stroke="url(#cyanPurple)" stroke-width="8"/>
    <path d="M174 52h1192M206 896h1260" stroke="url(#cyanPurple)" stroke-width="2" opacity="0.82"/>
  </g>

  <g class="mono" font-size="31" fill="#22f6ff">
    <text x="164" y="103">phase1@system:~$</text>
    <rect x="379" y="82" width="14" height="27" fill="#e9fbff"/>
  </g>
  <g class="mono muted" font-size="18">
    <text x="164" y="275">&gt; init system</text>
    <text x="164" y="302">&gt; load modules</text>
    <text x="164" y="329">&gt; verify integrity</text>
    <text x="164" y="356">&gt; all-systems nominal</text>
  </g>

  <g class="mono muted" font-size="18">
    <rect x="1282" y="448" width="194" height="140" fill="#06111b" stroke="#17364a"/>
    <text x="1304" y="475">&gt; phase1 --version</text>
    <text x="1304" y="502">v4.2.0-stable</text>
    <text x="1304" y="535">&gt; status</text>
    <text x="1304" y="562">stable</text>
    <text x="1304" y="586">&gt; quality --score</text>
  </g>

  <g class="heavy" filter="url(#glow)">
    <text x="292" y="222" font-size="132" fill="#f7fdff" letter-spacing="10" textLength="628" lengthAdjust="spacingAndGlyphs" stroke="#06111a" stroke-width="5">PHASE1</text>
    <text x="957" y="222" font-size="132" fill="#9c8cff" letter-spacing="6" textLength="424" lengthAdjust="spacingAndGlyphs" stroke="#06111a" stroke-width="5">v4.2.0</text>
    <text x="836" y="356" font-size="122" fill="url(#stable)" letter-spacing="12" text-anchor="middle" textLength="608" lengthAdjust="spacingAndGlyphs" stroke="#06111a" stroke-width="5">STABLE</text>
  </g>

  <g text-anchor="middle" class="mono" font-size="43" fill="#ffffff">
    <path d="M356 405h115M1201 405h115" stroke="#25f6ff" stroke-width="3"/>
    <text x="836" y="414">Terminal-based computing system</text>
  </g>

  <g filter="url(#softGlow)">
    <rect x="486" y="448" width="700" height="145" rx="18" fill="#070817" stroke="url(#cyanPurple)" stroke-width="3"/>
    <path d="M588 471l59 32v65l-59 32-59-32v-65z" fill="none" stroke="#caa7ff" stroke-width="9"/>
    <path d="M561 534l24 25 55-63" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="heavy" x="707" y="525" font-size="86" fill="#f5eeff" textLength="430" lengthAdjust="spacingAndGlyphs">100/100</text>
    <text class="heavy" x="704" y="566" font-size="34" fill="#b56bff" letter-spacing="7" textLength="384" lengthAdjust="spacingAndGlyphs">QUALITY SCORE</text>
  </g>

  <g class="sans" font-weight="800" font-size="30">
    <g>
      <rect x="220" y="612" width="298" height="102" rx="6" fill="url(#panel)" stroke="#25f6ff"/>
      <path d="M268 635l49 21v31c0 31-23 49-49 63-26-14-49-32-49-63v-31z" fill="none" stroke="#25f6ff" stroke-width="7"/>
      <path d="M247 688l17 17 32-42" fill="none" stroke="#25f6ff" stroke-width="7"/>
      <text x="315" y="659" fill="#fff">SAFE MODE</text>
      <text x="315" y="695" fill="#25f6ff">ON</text>
    </g>
    <g>
      <rect x="532" y="612" width="298" height="102" rx="6" fill="url(#panel)" stroke="#8778ff"/>
      <rect x="578" y="662" width="48" height="43" rx="5" fill="none" stroke="#b669ff" stroke-width="7"/>
      <path d="M590 662v-22c0-30 25-40 41-24 7 7 10 15 10 24v22" fill="none" stroke="#b669ff" stroke-width="7"/>
      <text x="643" y="659" fill="#fff">HOST TRUST</text>
      <text x="643" y="695" fill="#b669ff">OFF</text>
    </g>
    <g>
      <rect x="844" y="612" width="298" height="102" rx="6" fill="url(#panel)" stroke="#25f6ff"/>
      <circle cx="904" cy="663" r="37" fill="none" stroke="#25f6ff" stroke-width="7"/>
      <path d="M867 663h74M904 626c20 22 20 52 0 74M904 626c-20 22-20 52 0 74" stroke="#25f6ff" stroke-width="5" fill="none"/>
      <text x="966" y="659" fill="#fff">OFFLINE-</text>
      <text x="966" y="695" fill="#25f6ff">FIRST</text>
    </g>
    <g>
      <rect x="1156" y="612" width="298" height="102" rx="6" fill="url(#panel)" stroke="#b669ff"/>
      <path d="M1218 631l42 24v48l-42 24-42-24v-48zM1218 631v48l42 24M1218 679l-42 24M1176 655l42 24 42-24" fill="none" stroke="#b669ff" stroke-width="6"/>
      <text x="1272" y="659" fill="#fff">WASI-LITE</text>
      <text x="1272" y="695" fill="#ff69ff">SANDBOXING</text>
    </g>
  </g>

  <text class="mono white" x="280" y="765" font-size="31">&gt; Validated release. Stable representation promoted and tagged.</text>

  <g>
    <rect x="164" y="805" width="1344" height="83" rx="6" fill="#060812" stroke="#7c72d9" stroke-width="2"/>
    <rect x="210" y="824" width="54" height="54" rx="5" fill="none" stroke="#25f6ff" stroke-width="5"/>
    <text x="222" y="862" class="mono" font-size="42" fill="#25f6ff">&gt;_</text>
    <text x="295" y="858" class="mono white" font-size="29">Built by <tspan fill="#25f6ff">Chase Bryan / Bryforge</tspan></text>
    <path d="M836 819v56" stroke="#2a6880" stroke-width="2"/>
    <circle cx="923" cy="850" r="23" fill="#f4fbff"/>
    <path d="M913 852c-4-4-6-9-4-14 2-7 8-11 15-11 5 0 9 2 12 5 4 4 5 9 4 14-2 7-8 11-15 11-1 7 5 10 12 8-7 7-21 6-24-13z" fill="#060812"/>
    <text x="968" y="858" class="mono" font-size="29" fill="#25f6ff">github.com/Bryforge/phase1</text>
  </g>

  <g class="sans" font-size="30" font-weight="900" fill="#ff65ff" filter="url(#glow)">
    <text x="40" y="430" transform="rotate(-90 40 430)">未来を構築する</text>
    <text x="1628" y="506" transform="rotate(-90 1628 506)">ターミナルが力だ</text>
  </g>

  <g stroke="#25f6ff" opacity="0.55">
    <path d="M143 113h35M143 137h12M143 161h8M143 185h12"/>
    <path d="M1355 104h25M1404 104h23M1449 104h25"/>
  </g>
  <g stroke="#b669ff" stroke-width="4" fill="none">
    <path d="M1353 103h31"/>
    <rect x="1416" y="82" width="22" height="22"/>
    <path d="M1476 82l29 29M1505 82l-29 29"/>
  </g>
</svg>
