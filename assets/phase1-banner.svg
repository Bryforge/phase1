<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Phase1 v4.2.0 Stable</title>
  <desc id="desc">Clean aligned Neo Tokyo README banner for Phase1 v4.2.0 stable with 100 out of 100 quality score, safe mode on, host trust off, offline-first posture, WASI-lite sandboxing, Bryforge credit, and GitHub project link.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#02060d"/>
      <stop offset="0.55" stop-color="#050915"/>
      <stop offset="1" stop-color="#0a0316"/>
    </linearGradient>
    <linearGradient id="cyanPurple" x1="0" x2="1">
      <stop offset="0" stop-color="#24f6ff"/>
      <stop offset="0.55" stop-color="#66f4ff"/>
      <stop offset="1" stop-color="#b66cff"/>
    </linearGradient>
    <linearGradient id="stable" x1="0" x2="1">
      <stop offset="0" stop-color="#23f6ff"/>
      <stop offset="1" stop-color="#b669ff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1">
      <stop offset="0" stop-color="#061823" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#080712" stop-opacity="0.97"/>
    </linearGradient>
    <radialGradient id="floorGlow" cx="50%" cy="100%" r="74%">
      <stop offset="0" stop-color="#391465" stop-opacity="0.9"/>
      <stop offset="0.45" stop-color="#101025" stop-opacity="0.52"/>
      <stop offset="1" stop-color="#02040a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0v32" fill="none" stroke="#14323f" stroke-width="1" opacity="0.34"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .mono{font-family:Menlo,Consolas,'SFMono-Regular',monospace}
      .sans{font-family:Arial,Helvetica,sans-serif}
      .heavy{font-family:'Arial Black',Impact,Arial,sans-serif;font-weight:900}
      .white{fill:#f4fbff}.cyan{fill:#24f6ff}.purple{fill:#b669ff}.muted{fill:#73829b;opacity:.58}
    </style>
  </defs>

  <rect width="1672" height="941" fill="url(#bg)"/>
  <rect width="1672" height="941" fill="url(#floorGlow)"/>
  <rect width="1672" height="941" fill="url(#grid)" opacity="0.46"/>

  <g opacity="0.46">
    <rect x="0" y="620" width="72" height="310" fill="#070512"/>
    <rect x="18" y="512" width="40" height="45" fill="#1e0b43"/>
    <rect x="12" y="565" width="50" height="52" fill="#330b58"/>
    <rect x="1600" y="582" width="72" height="348" fill="#070512"/>
    <rect x="1616" y="470" width="38" height="88" fill="#210a4b"/>
    <rect x="1578" y="670" width="22" height="238" fill="#0c1230"/>
    <g fill="#ff4dff" opacity="0.52">
      <rect x="18" y="690" width="34" height="5"/>
      <rect x="1620" y="530" width="30" height="5"/>
      <rect x="1620" y="548" width="28" height="5"/>
      <rect x="30" y="760" width="26" height="5"/>
    </g>
    <g fill="#00eaff" opacity="0.42">
      <rect x="75" y="720" width="25" height="130"/>
      <rect x="1540" y="640" width="22" height="180"/>
    </g>
  </g>

  <g filter="url(#softGlow)">
    <rect x="104" y="50" width="1464" height="846" rx="12" fill="#020610" stroke="url(#cyanPurple)" stroke-width="4"/>
    <path d="M104 140V72l42-42h150M1568 140V72l-42-42h-150M104 804v68l42 42h150M1568 804v68l-42 42h-150" fill="none" stroke="url(#cyanPurple)" stroke-width="8"/>
    <path d="M174 52h1192M206 896h1260" stroke="url(#cyanPurple)" stroke-width="2" opacity="0.82"/>
  </g>

  <g class="mono" font-size="27" fill="#24f6ff">
    <text x="190" y="112">phase1@system:~$</text>
    <rect x="398" y="91" width="13" height="24" fill="#e9fbff"/>
  </g>
  <g class="mono muted" font-size="18">
    <text x="200" y="320">&gt; init system</text>
    <text x="200" y="347">&gt; load modules</text>
    <text x="200" y="374">&gt; verify integrity</text>
    <text x="200" y="401">&gt; all-systems nominal</text>
  </g>
  <g class="mono muted" font-size="18">
    <rect x="1260" y="500" width="208" height="126" fill="#06111b" stroke="#17364a"/>
    <text x="1282" y="528">&gt; phase1 --version</text>
    <text x="1282" y="555">v4.2.0-stable</text>
    <text x="1282" y="588">&gt; status</text>
    <text x="1282" y="615">stable</text>
  </g>

  <g class="heavy" filter="url(#glow)" text-anchor="middle">
    <text x="836" y="242" font-size="128" fill="#f7fdff" letter-spacing="10" stroke="#06111a" stroke-width="5">PHASE1 <tspan fill="#9c8cff">v4.2.0</tspan></text>
    <text x="836" y="370" font-size="118" fill="url(#stable)" letter-spacing="12" stroke="#06111a" stroke-width="5">STABLE</text>
  </g>

  <g text-anchor="middle" class="mono" font-size="39" fill="#ffffff">
    <path d="M360 440h142M1170 440h142" stroke="#24f6ff" stroke-width="3"/>
    <text x="836" y="452">Terminal-based computing system</text>
  </g>

  <g filter="url(#softGlow)">
    <rect x="486" y="486" width="700" height="120" rx="18" fill="#070817" stroke="url(#cyanPurple)" stroke-width="3"/>
    <path d="M573 508l50 28v56l-50 28-50-28v-56z" fill="none" stroke="#caa7ff" stroke-width="8"/>
    <path d="M550 561l21 21 47-54" fill="none" stroke="#fff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="heavy" x="686" y="560" font-size="76" fill="#f5eeff">100/100</text>
    <text class="heavy" x="690" y="593" font-size="30" fill="#b56bff" letter-spacing="6">QUALITY SCORE</text>
  </g>

  <g class="sans" font-weight="800">
    <g>
      <rect x="218" y="642" width="292" height="96" rx="7" fill="url(#panel)" stroke="#24f6ff"/>
      <path d="M281 662l42 18v29c0 26-20 43-42 55-22-12-42-29-42-55v-29z" fill="none" stroke="#24f6ff" stroke-width="7"/>
      <path d="M262 709l17 17 35-45" fill="none" stroke="#24f6ff" stroke-width="7"/>
      <text x="334" y="685" font-size="27" fill="#fff">SAFE MODE</text>
      <text x="334" y="720" font-size="27" fill="#24f6ff">ON</text>
    </g>
    <g>
      <rect x="526" y="642" width="292" height="96" rx="7" fill="url(#panel)" stroke="#8778ff"/>
      <rect x="575" y="690" width="42" height="38" rx="5" fill="none" stroke="#b669ff" stroke-width="7"/>
      <path d="M586 690v-20c0-26 22-35 36-21 7 7 9 14 9 21v20" fill="none" stroke="#b669ff" stroke-width="7"/>
      <text x="635" y="685" font-size="27" fill="#fff">HOST TRUST</text>
      <text x="635" y="720" font-size="27" fill="#b669ff">OFF</text>
    </g>
    <g>
      <rect x="834" y="642" width="292" height="96" rx="7" fill="url(#panel)" stroke="#24f6ff"/>
      <circle cx="897" cy="690" r="35" fill="none" stroke="#24f6ff" stroke-width="7"/>
      <path d="M862 690h70M897 655c18 21 18 50 0 70M897 655c-18 21-18 50 0 70" stroke="#24f6ff" stroke-width="5" fill="none"/>
      <text x="954" y="685" font-size="27" fill="#fff">OFFLINE-</text>
      <text x="954" y="720" font-size="27" fill="#24f6ff">FIRST</text>
    </g>
    <g>
      <rect x="1142" y="642" width="312" height="96" rx="7" fill="url(#panel)" stroke="#b669ff"/>
      <path d="M1203 661l38 22v44l-38 22-38-22v-44zM1203 661v44l38 22M1203 705l-38 22M1165 683l38 22 38-22" fill="none" stroke="#b669ff" stroke-width="6"/>
      <text x="1258" y="685" font-size="27" fill="#fff">WASI-LITE</text>
      <text x="1258" y="720" font-size="27" fill="#ff69ff">SANDBOXING</text>
    </g>
  </g>

  <text class="mono white" x="286" y="781" font-size="30">&gt; Validated release. Stable representation promoted and tagged.</text>

  <g>
    <rect x="198" y="816" width="1276" height="72" rx="7" fill="#060812" stroke="#7c72d9" stroke-width="2"/>
    <rect x="240" y="831" width="48" height="48" rx="5" fill="none" stroke="#24f6ff" stroke-width="5"/>
    <text x="251" y="865" class="mono" font-size="36" fill="#24f6ff">&gt;_</text>
    <text x="322" y="862" class="mono white" font-size="27">Built by <tspan fill="#24f6ff">Chase Bryan / Bryforge</tspan></text>
    <path d="M830 828v48" stroke="#2a6880" stroke-width="2"/>
    <circle cx="905" cy="852" r="20" fill="#f4fbff"/>
    <text x="942" y="862" class="mono" font-size="27" fill="#24f6ff">github.com/Bryforge/phase1</text>
  </g>

  <g class="sans" font-size="27" font-weight="900" fill="#ff65ff" filter="url(#glow)">
    <text x="44" y="432" transform="rotate(-90 44 432)">未来を構築する</text>
    <text x="1628" y="518" transform="rotate(-90 1628 518)">ターミナルが力だ</text>
  </g>
  <g stroke="#24f6ff" opacity="0.55">
    <path d="M143 113h35M143 137h12M143 161h8M143 185h12"/>
  </g>
  <g stroke="#b669ff" stroke-width="4" fill="none">
    <path d="M1348 108h28"/>
    <rect x="1412" y="88" width="22" height="22"/>
    <path d="M1472 88l29 29M1501 88l-29 29"/>
  </g>
</svg>
