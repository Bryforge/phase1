[package]
name = "phase1"
version = "0.3.0"
edition = "2021"
authors = ["Chase Bryan"]
description = "Terminal-based educational embedded OS simulator in Rust. Demonstrates process management, memory accounting, kernel concepts, and extensibility."
license = "GPL-3.0"
readme = "README.md"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true
